<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">
    <h2>🎵 Trackora</h2>
    <div>
        <a href="/dashboard">Dashboard</a>
        <a href="/groups">Groups</a>
    </div>
</div>

<div class="dashboard">

    <h1>🏆 Leaderboard</h1>

    {% for member in members %}
        <div class="hub-card">
            <h3>{{loop.index}}. {{member[0]}}</h3>
            <p>Points: {{member[1]}}</p>
            <p>Streak: {{member[2]}} days</p>
        </div>
    {% endfor %}

    <a href="/groups">
        <button>⬅ Back</button>
    </a>

</div>

</body>
</html>
