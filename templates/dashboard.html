<!DOCTYPE html>
<html>
<head>
    <title>Trackora</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="dashboard">

    <h1>Welcome to Trackora</h1>
    <p>Choose a hub to get started</p>

    <div class="hub-container">

        <!-- GROUP HUB -->
        <a href="/groups" class="hub-link">
            <div class="hub-card purple">
                <h2>👥 Group Hub</h2>
                <p>Create, join and manage groups</p>
            </div>
        </a>

        <!-- PRACTICE HUB -->
        <form method="POST" action="/practice" class="hub-link">
            <button class="hub-card green">
                <h2>🎵 Practice Hub</h2>
                <p>Mark today’s practice</p>
            </button>
        </form>

        <!-- STREAK HUB -->
        <div class="hub-card orange">
            <h2>🔥 Streak Hub</h2>
            <p>{{streak}} days</p>
            <p>{{points}} points</p>
        </div>

    </div>

</div>

</body>
</html>
