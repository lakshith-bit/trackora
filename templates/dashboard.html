<!DOCTYPE html>
<html>
<head>
    <title>Trackora</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="dashboard">

    <h1>Welcome {{user}}</h1>
    <p>Your music journey, tracked socially</p>

    <div class="hub-container">

        <!-- GROUP HUB -->
        <a href="/groups" class="hub-link">
            <div class="hub-card purple">
                <h2>👥 Group Hub</h2>
                <p>Create, join and manage groups</p>
            </div>
        </a>

        <!-- PRACTICE -->
        <form method="POST" action="/practice" class="hub-link">
            <button class="hub-card green">
                <h2>🎵 Practice Hub</h2>
                <p>Mark today's practice</p>
            </button>
        </form>

        <!-- STREAK -->
        <div class="hub-card orange">
            <h2>🔥 Streak Hub</h2>
            <p>{{streak}} days</p>
            <p>{{points}} points</p>
        </div>

        <!-- PERFORMANCE -->
        <a href="/performance" class="hub-link">
            <div class="hub-card blue">
                <h2>📊 Performance Hub</h2>
                <p>Track your progress</p>
            </div>
        </a>

        <!-- COLLAB -->
        <a href="/collab" class="hub-link">
            <div class="hub-card purple">
                <h2>🤝 Collab Hub</h2>
                <p>Connect with musicians</p>
            </div>
        </a>

        <!-- MOTIVATION -->
        <div class="hub-card">
            <h3>💡 Motivation</h3>
            <p>{{quote}}</p>
        </div>

    </div>

</div>

</body>
</html>
