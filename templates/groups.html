<!DOCTYPE html>
<html>
<head>
    <title>Groups</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="stat-card">
            <p>Individual Streak</p>
            <h1>{{streak}}</h1>
            <span>days</span>
        </div>

        <div class="stat-card">
            <p>Group Streak</p>
            <h1>-</h1>
            <span>days</span>
        </div>
    </div>

    <!-- MAIN -->
    <div class="content">

        <h1>Group Hub</h1>

        <div class="action-box">
            <form method="POST" action="/create_group">
                <input name="group_name" placeholder="Create group..." required>
                <button>Create</button>
            </form>

            <form method="POST" action="/join_group">
                <input name="group_id" placeholder="Join with ID..." required>
                <button>Join</button>
            </form>
        </div>

        <h2>All Groups</h2>

        <div class="group-grid">
            {% for group in groups %}
                <div class="group-card">
                    <h3>{{group[1]}}</h3>
                    <p>Invite Code: {{group[0]}}</p>
                    <p>🔥 Streak: {{group[2]}} days</p>

                    {% if group[3] %}
                        <p style="color:red;">Broken by: {{group[3]}}</p>
                    {% endif %}
                </div>
            {% endfor %}
        </div>

    </div>

</div>

</body>
</html>
